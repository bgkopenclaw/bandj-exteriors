      <stop offset="0%"  stop-color="#5B9CBF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#1F6A9B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#1B2125" stop-opacity="0"/>
    </radialGradient>
    <pattern id="ogStrakes" x="0" y="0" width="1200" height="32" patternUnits="userSpaceOnUse">
