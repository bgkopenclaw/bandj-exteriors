<!-- Default Open Graph card. 1200×630, brand-matched. Per-page overrides via BaseLayout's ogImage prop. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="B&amp;J Exteriors — Power washing in Bergen County, NJ">
