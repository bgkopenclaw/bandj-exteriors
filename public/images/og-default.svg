  <rect width="1200" height="630" fill="url(#ogLamp)"/>

  <!-- Top mono row -->
  <text x="64" y="80" fill="#9C968A" font-family="ui-monospace, monospace" font-size="20" letter-spacing="2">N° 00 — INDEX</text>
